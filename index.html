    <link rel="stylesheet" href="/styles/tokens.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
              display: ['Fraunces', 'Georgia', 'serif'],
            },
            colors: {
              'brand-bg': 'var(--bg)',
              'brand-surface': 'var(--surface)',
              'brand-surface-2': 'var(--surface-2)',
              'brand-text': 'var(--text)',
              'brand-text-dim': 'var(--text-2)',
              'brand-border': 'var(--border)',
              'brand-primary': 'var(--brand)',
              'brand-accent': 'var(--accent)',
              'brand-particle': 'var(--particle)',
              'brand-ring': 'var(--ring)',
              'brand-positive': 'var(--positive)',
              'brand-warning': 'var(--warning)',
              'brand-background': 'var(--bg)',
              'brand-secondary': 'var(--text-2)',
              'phase-menstruation': 'var(--phase-menstruation)',
              'phase-follicular': 'var(--phase-follicular)',
              'phase-ovulation': 'var(--phase-ovulation)',
              'phase-luteal': 'var(--phase-luteal)',
            },
            screens: {
              xs: '360px',
              sm: '390px',
              md: '768px',
              lg: '1024px',
              xl: '1280px',
              '2xl': '1440px',
            },
            minHeight: {
              touch: '44px',
            },
            minWidth: {
              touch: '44px',
            },
          }
        }
      }
    </script>
    <script>
      (function () {
        try {
          var skin = localStorage.getItem('aura-skin-preview') || 'classic';
          if (skin !== 'living-cycle' && skin !== 'classic') skin = 'classic';
          document.documentElement.setAttribute('data-skin', skin);
          if (skin === 'classic') {
            document.documentElement.setAttribute('data-theme', 'dark');
            var metaC = document.querySelector('meta[name="theme-color"]');
            if (metaC) metaC.setAttribute('content', '#0a0a0f');
          } else {
            var stored = localStorage.getItem('aura-theme-preview');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-skin', 'classic');
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>

      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then(() => {
            console.log('SW registered');
          }).catch(() => {
            console.log('SW registration failed');
          });
        });
      }
    </script>
